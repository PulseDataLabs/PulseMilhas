name: PulseMilhas – Coleta Automática de Dados

on:
  schedule:
    - cron: '0 9,15,21 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout do código
      uses: actions/checkout@v6

    - name: Configurar Fuso Horário Local
      run: sudo timedatectl set-timezone America/Sao_Paulo

    - name: Configurar Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Executar scrapers
      run: python run_all.py || true

    - name: Commitar e enviar alterações
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/
        git commit -m "Bot: Atualização automática de dados [skip ci]" || echo "Nenhuma alteração nos dados hoje."
        git push origin main
